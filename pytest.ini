[pytest]
testpaths = tests
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning

# Test classifications — required by Enterprise QA Strategy (12-layer).
# Run subsets with:  pytest -m smoke   (post-deploy <60s pack)
#                    pytest -m "not slow and not requires_network"
markers =
    smoke: post-deploy fast pack (<60s)
    unit: pure-function unit tests
    integration: cross-module interaction tests
    functional: business-function tests (entry, exit, risk gates)
    system: full platform under realistic load
    e2e: signal → execution → management → closure → learning
    regression: every historical defect (permanent)
    invariant: business invariant guards (synthetic separation, money correctness)
    risk: risk engine + circuit breaker + position sizing
    learning_safety: data-poisoning resistance for journal/cohort/calibration
    ai_safety: prompt injection, hallucination resistance, fallback
    data_integrity: option chain consistency, IV sanity, price freshness
    security: secrets, auth, dependency scans
    performance: latency / throughput budgets
    load: N-symbol scaling
    stress: vendor outage, rate-limit storm
    endurance: multi-day / memory-leak
    dr: disaster recovery, backup restore
    slow: > 10s — excluded from quick runs
    requires_network: hits external API
    requires_thetadata: needs running ThetaData terminal
    requires_anthropic: needs ANTHROPIC_API_KEY
