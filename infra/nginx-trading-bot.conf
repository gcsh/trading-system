# nginx config for trading-bot — Tier 2 of the perf plan.
#
# Sits between cloudflared (which connects to 127.0.0.1:8000) and the
# FastAPI/uvicorn app (which now lives on 127.0.0.1:8001). Serves
# /assets/* directly from disk (sendfile + gzip + immutable cache) so
# the Python process never sees static-file traffic. All other paths
# proxy through to uvicorn unchanged.
#
# Deployed to /etc/nginx/conf.d/trading-bot.conf on EC2 by deploy.sh.

upstream trading_bot_api {
    server 127.0.0.1:8001 fail_timeout=0;
    keepalive 32;
}

server {
    listen 127.0.0.1:8000;
    server_name _;

    # Reasonable timeouts so a slow API call doesn't kill the connection.
    proxy_connect_timeout 5s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;
    send_timeout          300s;

    # Allow large request bodies for backfill/deploy ops without a 413.
    client_max_body_size 50m;

    # Gzip text-y responses. Static .js/.css gzip via gzip_static below.
    gzip on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/wasm
        image/svg+xml;
    gzip_vary on;

    # ── Static assets ───────────────────────────────────────────────
    # Vite emits content-hashed filenames so the URL changes on every
    # release — safe to mark immutable + cache for a year.
    location /assets/ {
        alias /opt/trading-bot/frontend/dist/assets/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        # Serve sibling .gz files if present, even when the client lies
        # about Accept-Encoding. Avoids a re-compress on every hit.
        gzip_static on;
        sendfile on;
        tcp_nopush on;
        # If a file isn't found, fall through to uvicorn (handles 404 logging).
        try_files $uri @uvicorn;
    }

    # Favicon + other root static files Vite emits.
    location = /favicon.svg {
        alias /opt/trading-bot/frontend/dist/favicon.svg;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
    }

    # ── Everything else proxies to uvicorn ───────────────────────────
    location / {
        proxy_pass http://trading_bot_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket upgrade — used by /ws/* live streams. When no
        # Upgrade header is present, $connection_upgrade is "" which
        # lets nginx keep-alive against the upstream (upstream{} sets
        # keepalive 32 above).
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
    }

    location @uvicorn {
        proxy_pass http://trading_bot_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# WebSocket connection upgrade map — referenced above.
# Lives outside server{} so it's evaluated at the http{} scope.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      "";
}
